<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PRD 工作台面试演示</title>
  <style>
    :root {
      --bg: #fafaf7;
      --paper: #ffffff;
      --paper-soft: #f5f3ee;
      --text: #1c1c1e;
      --muted: #6b6b73;
      --line: #e8e6e0;
      --purple: #a78bfa;
      --pink: #f472b6;
      --teal: #14b8a6;
      --amber: #f59e0b;
      --danger: #ef4444;
      --shadow: 0 18px 50px rgba(26, 24, 31, .08);
      --gradient: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        linear-gradient(135deg, rgba(167,139,250,.10), transparent 38%),
        linear-gradient(225deg, rgba(20,184,166,.08), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--text);
      min-height: 36px;
      padding: 7px 12px;
      cursor: pointer;
    }
    button:hover { border-color: color-mix(in srgb, var(--purple) 55%, var(--line)); }
    button.primary {
      border: 0;
      color: #fff;
      background: var(--gradient);
      box-shadow: 0 8px 24px rgba(167,139,250,.22);
    }
    button.ghost { background: transparent; }
    button.danger { color: var(--danger); }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--text);
      padding: 9px 10px;
      outline: none;
    }
    textarea { min-height: 90px; resize: vertical; }
    .shell { max-width: 1480px; margin: 0 auto; padding: 24px; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--paper) 88%, transparent);
      box-shadow: var(--shadow);
    }
    .eyebrow {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 13px;
    }
    h1, h2, h3 { margin: 0; line-height: 1.2; letter-spacing: 0; }
    h1 {
      font-size: 28px;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    h2 { font-size: 18px; }
    h3 { font-size: 15px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .grid {
      display: grid;
      grid-template-columns: minmax(320px, .85fr) minmax(480px, 1.15fr);
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--paper) 92%, transparent);
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .panel-body { padding: 16px; }
    .stack { display: grid; gap: 12px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    label span { color: var(--text); font-weight: 650; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--muted);
      background: var(--paper-soft);
      font-size: 12px;
    }
    .chip.ok { color: #047857; background: rgba(20,184,166,.11); border-color: rgba(20,184,166,.25); }
    .chip.warn { color: #92400e; background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.25); }
    .chat-box {
      display: grid;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
      padding-right: 4px;
    }
    .msg {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--paper-soft);
      white-space: pre-wrap;
      cursor: pointer;
    }
    .msg.user { background: rgba(167,139,250,.10); border-color: rgba(167,139,250,.30); }
    .msg.active { border-color: var(--purple); box-shadow: 0 0 0 2px rgba(167,139,250,.16); }
    .reply-tag { display: inline-flex; margin-top: 8px; color: var(--muted); font-size: 12px; }
    .msg strong { display: block; margin-bottom: 4px; font-size: 12px; color: var(--muted); }
    .chat-edit-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid rgba(167,139,250,.24);
      border-radius: 8px;
      padding: 8px 10px;
      background: rgba(167,139,250,.08);
      color: var(--muted);
      font-size: 12px;
    }
    .chat-edit-bar.active { display: flex; }
    .question-list { display: grid; gap: 8px; }
    .question-btn { text-align: left; min-height: 0; padding: 8px 10px; }
    .tabs { display: flex; gap: 6px; padding: 8px; border-bottom: 1px solid var(--line); overflow-x: auto; }
    .tab { white-space: nowrap; }
    .tab.active { color: #fff; background: var(--gradient); border: 0; }
    .section-editor { display: none; }
    .section-editor.active { display: grid; gap: 12px; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 8px; background: var(--paper); }
    table { width: 100%; min-width: 620px; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--line); padding: 8px; text-align: left; vertical-align: top; }
    th { position: sticky; top: 0; background: var(--paper-soft); font-size: 12px; color: var(--muted); }
    td[contenteditable="true"], .editable {
      outline: none;
      min-width: 90px;
      border-radius: 6px;
    }
    td[contenteditable="true"]:focus, .editable:focus { box-shadow: inset 0 0 0 2px rgba(167,139,250,.35); }
    .doc-preview {
      max-height: 720px;
      overflow: auto;
      padding: 20px;
    }
    .doc-preview h2 { margin: 24px 0 10px; padding-left: 10px; border-left: 4px solid var(--purple); }
    .doc-preview h3 { margin: 16px 0 8px; }
    .doc-preview p { margin: 8px 0; }
    .doc-preview table { margin: 10px 0 18px; }
    .doc-preview [contenteditable="true"] {
      outline: none;
      border-radius: 6px;
      box-shadow: inset 0 0 0 1px rgba(167,139,250,.28);
      background: rgba(167,139,250,.06);
    }
    .doc-preview [contenteditable="true"]:focus { box-shadow: inset 0 0 0 2px rgba(167,139,250,.45); }
    .preview-table-actions { margin: -8px 0 18px; }
    .meta-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .metric { border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: var(--paper-soft); }
    .metric b { display: block; font-size: 12px; color: var(--muted); }
    .metric span { display: block; margin-top: 4px; font-weight: 700; }
    .hint { color: var(--muted); font-size: 12px; margin: 0; }
    .divider { height: 1px; background: var(--line); margin: 4px 0; }
    @media (max-width: 1180px) {
      .grid { grid-template-columns: 1fr; }
      .doc-preview { max-height: none; }
    }
    @media (max-width: 720px) {
      .shell { padding: 12px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; }
      .row, .meta-grid { grid-template-columns: 1fr; }
      h1 { font-size: 23px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">PRD Writer Agent · 交互式需求工作台</p>
        <h1 id="pageTitle">PRD 工作台面试演示 PRD 工作台</h1>
      </div>
      <div class="actions">
        <button id="saveBtn">保存草稿</button>
        <button id="exportMdBtn">导出 Markdown</button>
        <button id="exportJsonBtn">导出 JSON</button>
        <button class="primary" id="exportHtmlBtn">导出网页</button>
      </div>
    </header>

    <main class="grid">
      <section class="panel">
        <div class="panel-head">
          <h2>1. 对话需求</h2>
          <span class="chip ok" id="saveStatus">本地草稿</span>
        </div>
        <div class="panel-body stack">
          <div class="chat-box" id="chatBox"></div>
          <textarea id="chatInput" placeholder="把想法、痛点、竞品、截图文字或临时修改写在这里..."></textarea>
          <div class="chat-edit-bar" id="chatEditBar"></div>
          <div class="actions">
            <button id="askNextBtn">下一问题</button>
            <button class="ghost" id="cancelChatEditBtn" style="display:none">取消</button>
            <button class="primary" id="sendBtn">记录到需求</button>
          </div>
          <div class="divider"></div>
          <h3>常用追问</h3>
          <div class="question-list" id="questionList"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>2. 填表补充</h2>
          <span class="chip warn">可边聊边填</span>
        </div>
        <div class="panel-body stack">
          <div class="row">
            <label><span>产品/项目名</span><input id="projectName" /></label>
            <label><span>当前状态</span><select id="status">
              <option>需求诊断中</option><option>概念待确认</option><option>PRD 草稿</option><option>待评审</option><option>已确认</option>
            </select></label>
          </div>
          <div class="row">
            <label><span>项目类型</span><select id="projectType">
              <option>软件产品</option><option>内部工具</option><option>AI 应用</option><option>内容/漫剧项目</option><option>运营活动</option><option>其他</option>
            </select></label>
            <label><span>平台形态</span><select id="platform">
              <option>Web</option><option>H5</option><option>小程序</option><option>桌面端</option><option>浏览器插件</option><option>移动 App</option><option>待确认</option>
            </select></label>
          </div>
          <label><span>一句话定义</span><textarea id="oneLine"></textarea></label>
          <label><span>目标用户</span><textarea id="targetUsers"></textarea></label>
          <label><span>核心问题/痛点</span><textarea id="problems"></textarea></label>
          <label><span>MVP 核心功能，建议 1-3 个</span><textarea id="mvp"></textarea></label>
          <div class="row">
            <label><span>优先级口径</span><select id="priorityMode"><option>MoSCoW</option><option>P0/P1/P2</option><option>Kano</option></select></label>
            <label><span>是否 AI 辅助开发</span><select id="aiWorkflow"><option>是，默认 Codex + Claude + Tuzi API</option><option>是，但工具待确认</option><option>否</option><option>待确认</option></select></label>
          </div>
          <label><span>本版不做</span><textarea id="outOfScope"></textarea></label>
          <label><span>成功标志/验收口径</span><textarea id="successMetrics"></textarea></label>
          <label><span>风险与待确认</span><textarea id="risks"></textarea></label>
          <div class="actions">
            <button id="fillSampleBtn">填入示例结构</button>
            <button class="primary" id="generateBtn">生成/刷新 PRD</button>
          </div>
        </div>
      </section>

    </main>

    <section class="panel" style="margin-top:16px">
      <div class="panel-head">
        <h2>3. PRD 网页预览</h2>
        <div class="chips">
          <button id="previewEditBtn">编辑预览</button>
          <span class="chip" id="versionChip">v0.1</span>
          <span class="chip" id="dateChip">2026-07-10</span>
        </div>
      </div>
      <article class="doc-preview" id="preview"></article>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "prd-workspace::PRD 工作台面试演示";
    const today = "2026-07-10";
    const questions = [
      "这个产品主要给谁用？他们现在最痛的场景是什么？",
      "MVP 只保留 1-3 个核心功能，你希望是哪几个？",
      "用户从进入到完成任务，最短路径是什么？",
      "这个版本明确不做什么，避免范围失控？",
      "上线后用什么指标判断做对了？",
      "是否涉及账号、权限、付费、AI、隐私或第三方 API？",
      "如果生成 PRD 后要继续开发，默认是否用 Codex + Claude + Tuzi API 工作流？"
    ];
    const baseSections = [
      { id: "overview", name: "文档说明", type: "meta" },
      { id: "scope", name: "MVP 范围", type: "table", columns: ["优先级", "功能", "解决的问题", "说明"] },
      { id: "requirements", name: "需求列表", type: "table", columns: ["编号", "模块", "需求", "类型", "优先级", "迭代", "说明"] },
      { id: "fields", name: "字段与数据", type: "table", columns: ["字段", "类型", "是否必填", "默认值", "校验规则", "说明"] },
      { id: "acceptance", name: "验收标准", type: "table", columns: ["场景", "前置条件", "操作", "预期结果", "异常处理"] },
      { id: "plan", name: "项目计划", type: "table", columns: ["阶段", "开始时间", "结束时间", "交付物", "负责人", "状态", "风险"] }
    ];
    const state = loadState();
    let activeQuestionIndex = null;
    let chatEditIndex = null;
    let previewEditing = false;

    function defaultState() {
      return {
        projectName: "PRD 工作台面试演示",
        status: "需求诊断中",
        projectType: "软件产品",
        platform: "Web",
        oneLine: "",
        targetUsers: "",
        problems: "",
        mvp: "",
        priorityMode: "MoSCoW",
        aiWorkflow: "是，默认 Codex + Claude + Tuzi API",
        outOfScope: "",
        successMetrics: "",
        risks: "",
        chat: [
          { role: "agent", text: "请先用大白话说一下你想做什么、给谁用、解决什么问题。我会把对话内容同步进 PRD 草稿。" }
        ],
        sections: {
          scope: [{ "优先级": "Must", "功能": "待确认", "解决的问题": "待确认", "说明": "先通过对话或填表补齐" }],
          requirements: [{ "编号": "R1", "模块": "核心模块", "需求": "待确认", "类型": "功能", "优先级": "P0", "迭代": "MVP", "说明": "待确认" }],
          fields: [{ "字段": "待确认", "类型": "文本", "是否必填": "待确认", "默认值": "-", "校验规则": "待确认", "说明": "待确认" }],
          acceptance: [{ "场景": "正常流程", "前置条件": "待确认", "操作": "待确认", "预期结果": "待确认", "异常处理": "待确认" }],
          plan: [{ "阶段": "需求评审", "开始时间": "待确认", "结束时间": "待确认", "交付物": "PRD", "负责人": "待确认", "状态": "待开始", "风险": "待确认" }]
        },
        notes: ""
      };
    }
    function loadState() {
      try { return Object.assign(defaultState(), JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}")); }
      catch (err) { return defaultState(); }
    }
    function saveState() {
      syncFormToState();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      document.getElementById("saveStatus").textContent = "已保存 " + new Date().toLocaleTimeString();
      renderPreview();
    }
    function bindField(id) {
      const el = document.getElementById(id);
      el.value = state[id] || "";
      el.addEventListener("input", () => { state[id] = el.value; renderPreview(); });
      el.addEventListener("change", saveState);
    }
    function syncFormToState() {
      ["projectName","status","projectType","platform","oneLine","targetUsers","problems","mvp","priorityMode","aiWorkflow","outOfScope","successMetrics","risks"].forEach(id => {
        const el = document.getElementById(id);
        if (el) state[id] = el.value;
      });
    }
    function renderChat() {
      const box = document.getElementById("chatBox");
      box.innerHTML = state.chat.map((item, index) => {
        const active = index === activeQuestionIndex || index === chatEditIndex;
        const replyTag = Number.isInteger(item.replyTo) && state.chat[item.replyTo]
          ? `<span class="reply-tag">补充：${escapeHtml(state.chat[item.replyTo].text.slice(0, 28))}</span>`
          : "";
        return `<div class="msg ${item.role === "user" ? "user" : ""} ${active ? "active" : ""}" data-chat-index="${index}" title="点击可回到这条访谈内容继续补充或修改"><strong>${item.role === "user" ? "我" : "PRD 访谈"}</strong>${escapeHtml(item.text)}${replyTag}</div>`;
      }).join("");
      box.querySelectorAll("[data-chat-index]").forEach(node => node.addEventListener("click", () => selectChatItem(Number(node.dataset.chatIndex))));
      const activeNode = box.querySelector(".msg.active");
      if (activeNode) activeNode.scrollIntoView({ block: "nearest" });
      else box.scrollTop = box.scrollHeight;
      updateChatEditBar();
    }
    function selectChatItem(index) {
      const item = state.chat[index];
      if (!item) return;
      const input = document.getElementById("chatInput");
      if (item.role === "agent") {
        activeQuestionIndex = index;
        chatEditIndex = null;
        input.value = "";
        input.placeholder = "正在补充这个问题：" + item.text;
      } else {
        chatEditIndex = index;
        activeQuestionIndex = Number.isInteger(item.replyTo) ? item.replyTo : null;
        input.value = item.text;
        input.placeholder = "正在修改这条回答";
        input.focus();
      }
      renderChat();
    }
    function updateChatEditBar() {
      const bar = document.getElementById("chatEditBar");
      const cancel = document.getElementById("cancelChatEditBtn");
      const send = document.getElementById("sendBtn");
      if (chatEditIndex !== null) {
        bar.className = "chat-edit-bar active";
        bar.innerHTML = `<span>正在修改第 ${chatEditIndex + 1} 条回答，保存后会同步到需求摘要。</span>`;
        cancel.style.display = "";
        send.textContent = "保存修改";
      } else if (activeQuestionIndex !== null) {
        bar.className = "chat-edit-bar active";
        bar.innerHTML = `<span>正在补充第 ${activeQuestionIndex + 1} 个问题。点击“取消”回到最新问题。</span>`;
        cancel.style.display = "";
        send.textContent = "补充回答";
      } else {
        bar.className = "chat-edit-bar";
        bar.innerHTML = "";
        cancel.style.display = "none";
        send.textContent = "记录到需求";
      }
    }
    function clearChatEdit() {
      activeQuestionIndex = null;
      chatEditIndex = null;
      const input = document.getElementById("chatInput");
      input.value = "";
      input.placeholder = "把想法、痛点、竞品、截图文字或临时修改写在这里...";
      renderChat();
    }
    function renderQuestions() {
      const list = document.getElementById("questionList");
      list.innerHTML = questions.map(q => `<button class="question-btn" data-q="${escapeAttr(q)}">${escapeHtml(q)}</button>`).join("");
      list.querySelectorAll("button").forEach(btn => btn.addEventListener("click", () => {
        state.chat.push({ role: "agent", text: btn.dataset.q });
        activeQuestionIndex = state.chat.length - 1;
        chatEditIndex = null;
        renderChat();
        saveState();
      }));
    }
    function addChat() {
      const input = document.getElementById("chatInput");
      const text = input.value.trim();
      if (!text) return;
      if (chatEditIndex !== null && state.chat[chatEditIndex]) {
        state.chat[chatEditIndex].text = text;
        appendNotesFromText("修改：" + text);
      } else {
        state.chat.push({ role: "user", text, replyTo: activeQuestionIndex });
        appendNotesFromText(text);
      }
      input.value = "";
      chatEditIndex = null;
      activeQuestionIndex = null;
      input.placeholder = "把想法、痛点、竞品、截图文字或临时修改写在这里...";
      renderChat();
      saveState();
    }
    function appendNotesFromText(text) {
      state.notes = (state.notes ? state.notes + "\n" : "") + "- " + text;
      if (!state.problems && /痛|问题|麻烦|难|低效|不能|缺/.test(text)) state.problems = text;
      if (!state.mvp && /功能|支持|需要|生成|导出|编辑|上传/.test(text)) state.mvp = text;
      hydrateForm();
    }
    function askNext() {
      const used = state.chat.filter(x => x.role === "agent").length;
      state.chat.push({ role: "agent", text: questions[used % questions.length] });
      activeQuestionIndex = state.chat.length - 1;
      chatEditIndex = null;
      renderChat();
      saveState();
    }
    function hydrateForm() {
      ["projectName","status","projectType","platform","oneLine","targetUsers","problems","mvp","priorityMode","aiWorkflow","outOfScope","successMetrics","risks"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = state[id] || "";
      });
    }
    function renderEditors() {
      const tabs = document.getElementById("tabs");
      const editors = document.getElementById("editors");
      if (!tabs || !editors) return;
      tabs.innerHTML = baseSections.map((section, index) => `<button class="tab ${index === 0 ? "active" : ""}" data-tab="${section.id}">${section.name}</button>`).join("");
      editors.innerHTML = baseSections.map((section, index) => {
        if (section.type === "meta") {
          return `<div class="section-editor ${index === 0 ? "active" : ""}" data-editor="${section.id}">
            <div class="meta-grid">
              <div class="metric"><b>项目名</b><span>${escapeHtml(state.projectName)}</span></div>
              <div class="metric"><b>状态</b><span>${escapeHtml(state.status)}</span></div>
              <div class="metric"><b>平台</b><span>${escapeHtml(state.platform)}</span></div>
              <div class="metric"><b>日期</b><span>${today}</span></div>
            </div>
            <p class="hint">文档说明来自左侧表单；修改项目名、状态和平台后会自动刷新。</p>
          </div>`;
        }
        const rows = state.sections[section.id] || [];
        const head = section.columns.map(col => `<th>${escapeHtml(col)}</th>`).join("") + "<th>操作</th>";
        const body = rows.map((row, rowIndex) => `<tr>${section.columns.map(col => `<td contenteditable="true" data-section="${section.id}" data-row="${rowIndex}" data-col="${escapeAttr(col)}">${escapeHtml(row[col] || "")}</td>`).join("")}<td><button class="danger" data-delete="${section.id}" data-row="${rowIndex}">删除</button></td></tr>`).join("");
        return `<div class="section-editor ${index === 0 ? "active" : ""}" data-editor="${section.id}">
          <div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
          <div class="actions"><button data-add-row="${section.id}">增加行</button></div>
        </div>`;
      }).join("");
      tabs.querySelectorAll(".tab").forEach(tab => tab.addEventListener("click", () => {
        tabs.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
        editors.querySelectorAll(".section-editor").forEach(x => x.classList.remove("active"));
        tab.classList.add("active");
        editors.querySelector(`[data-editor="${tab.dataset.tab}"]`).classList.add("active");
      }));
      editors.querySelectorAll("[contenteditable]").forEach(cell => cell.addEventListener("input", () => {
        const row = state.sections[cell.dataset.section][Number(cell.dataset.row)];
        row[cell.dataset.col] = cell.textContent.trim();
        renderPreview();
      }));
      editors.querySelectorAll("[contenteditable]").forEach(cell => cell.addEventListener("blur", saveState));
      editors.querySelectorAll("[data-add-row]").forEach(btn => btn.addEventListener("click", () => {
        addRow(btn.dataset.addRow);
      }));
      editors.querySelectorAll("[data-delete]").forEach(btn => btn.addEventListener("click", () => {
        state.sections[btn.dataset.delete].splice(Number(btn.dataset.row), 1);
        renderEditors();
        saveState();
      }));
    }
    function addRow(sectionId) {
      const section = baseSections.find(x => x.id === sectionId);
      const row = {};
      section.columns.forEach(col => row[col] = "待确认");
      if (sectionId === "requirements") row["编号"] = "R" + (state.sections.requirements.length + 1);
      state.sections[sectionId].push(row);
      renderEditors();
      saveState();
    }
    function generateFromForm() {
      syncFormToState();
      const features = splitLines(state.mvp);
      state.sections.scope = features.length ? features.slice(0, 3).map((feature, index) => ({
        "优先级": index === 0 ? "Must" : "Should",
        "功能": feature,
        "解决的问题": state.problems || "待确认",
        "说明": "来自填表/对话，后续可细化"
      })) : state.sections.scope;
      state.sections.requirements = (features.length ? features : ["待确认"]).map((feature, index) => ({
        "编号": "R" + (index + 1),
        "模块": feature === "待确认" ? "核心模块" : feature,
        "需求": feature,
        "类型": "功能",
        "优先级": index === 0 ? "P0" : "P1",
        "迭代": "MVP",
        "说明": state.successMetrics || "待确认"
      }));
      renderEditors();
      saveState();
    }
    function fillSample() {
      state.oneLine ||= "为目标用户提供一个可对话、可填表、可编辑、可导出的 PRD 生成工作台。";
      state.targetUsers ||= "产品经理、独立开发者、AI 应用策划、需要快速整理需求的人。";
      state.problems ||= "需求收集分散在聊天和文档里，生成后不方便继续改表格和导出网页。";
      state.mvp ||= "对话式需求收集\n选择题/表单补充需求\n生成可编辑 PRD 并导出网页";
      state.outOfScope ||= "本版不做多人协作、账号系统、云端同步、外部模型自动调用。";
      state.successMetrics ||= "能在一个本地网页里完成需求收集、PRD 生成、表格修改和 HTML 导出。";
      state.risks ||= "浏览器本地存储不等于正式数据库；外部 API 价格和模型能力需单独核验。";
      hydrateForm();
      generateFromForm();
    }
    function renderPreview() {
      syncFormToState();
      document.getElementById("pageTitle").textContent = state.projectName + " PRD 工作台";
      document.getElementById("versionChip").textContent = "v0.1";
      document.getElementById("dateChip").textContent = today;
      document.getElementById("previewEditBtn").textContent = previewEditing ? "完成预览编辑" : "编辑预览";
      document.getElementById("preview").innerHTML = buildPrdHtml();
      bindPreviewEdits();
    }
    function buildPrdHtml() {
      return `
        <h1>${escapeHtml(state.projectName)} PRD</h1>
        <div class="meta-grid">
          <div class="metric"><b>状态</b><span>${escapeHtml(state.status)}</span></div>
          <div class="metric"><b>类型</b><span>${escapeHtml(state.projectType)}</span></div>
          <div class="metric"><b>平台</b><span>${escapeHtml(state.platform)}</span></div>
          <div class="metric"><b>更新日期</b><span>${today}</span></div>
        </div>
        <h2>0. 文档说明</h2>
        ${tableHtml(["项目","内容"], [
          {"项目": "文档版本", "内容": "v0.1"},
          {"项目": "创建日期", "内容": today},
          {"项目": "当前状态", "内容": state.status},
          {"项目": "优先级口径", "内容": state.priorityMode}
        ])}
        <h2>1. 背景与目标</h2>
        <h3>1.1 一句话产品定义</h3>${editableBlock("oneLine", state.oneLine || "待确认")}
        <h3>1.2 目标用户</h3>${editableBlock("targetUsers", state.targetUsers || "待确认")}
        <h3>1.3 核心问题</h3>${editableBlock("problems", state.problems || "待确认")}
        <h3>1.4 成功标志</h3>${editableBlock("successMetrics", state.successMetrics || "待确认")}
        <h2>2. 范围定义</h2>
        <h3>2.1 MVP 范围</h3>${tableHtml(baseSections.find(x => x.id === "scope").columns, state.sections.scope, "scope")}
        <h3>2.2 本版不做</h3>${editableBlock("outOfScope", state.outOfScope || "待确认")}
        <h2>3. 需求列表</h2>${tableHtml(baseSections.find(x => x.id === "requirements").columns, state.sections.requirements, "requirements")}
        <h2>4. 字段与数据</h2>${tableHtml(baseSections.find(x => x.id === "fields").columns, state.sections.fields, "fields")}
        <h2>5. 验收标准</h2>${tableHtml(baseSections.find(x => x.id === "acceptance").columns, state.sections.acceptance, "acceptance")}
        <h2>6. 项目计划</h2>${tableHtml(baseSections.find(x => x.id === "plan").columns, state.sections.plan, "plan")}
        <h2>7. 工作流设计</h2>
        ${editableBlock("aiWorkflow", state.aiWorkflow || "待确认")}
        <h2>8. 风险与待确认</h2>
        ${editableBlock("risks", state.risks || "待确认")}
        <h2>9. 对话记录摘要</h2>
        ${editableBlock("notes", state.notes || "待补充")}`;
    }
    function editableBlock(field, value) {
      const attr = previewEditing ? ` contenteditable="true" data-preview-field="${escapeAttr(field)}"` : "";
      return `<p${attr}>${nl2br(value)}</p>`;
    }
    function tableHtml(columns, rows, sectionId = "") {
      const editable = previewEditing && sectionId;
      const head = columns.map(col => `<th>${escapeHtml(col)}</th>`).join("") + (editable ? "<th>操作</th>" : "");
      const body = (rows || []).map((row, rowIndex) => {
        const cells = columns.map(col => {
          const attr = editable ? ` contenteditable="true" data-preview-section="${escapeAttr(sectionId)}" data-row="${rowIndex}" data-col="${escapeAttr(col)}"` : "";
          return `<td${attr}>${nl2br(row[col] || "")}</td>`;
        }).join("");
        const actions = editable ? `<td><button class="danger" data-preview-delete="${escapeAttr(sectionId)}" data-row="${rowIndex}">删除</button></td>` : "";
        return `<tr>${cells}${actions}</tr>`;
      }).join("");
      const add = editable ? `<div class="actions preview-table-actions"><button data-preview-add-row="${escapeAttr(sectionId)}">增加行</button></div>` : "";
      return `<div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>${add}`;
    }
    function bindPreviewEdits() {
      const preview = document.getElementById("preview");
      preview.querySelectorAll("[data-preview-field]").forEach(node => {
        node.addEventListener("input", () => {
          state[node.dataset.previewField] = node.textContent.trim();
          hydrateForm();
        });
        node.addEventListener("blur", saveState);
      });
      preview.querySelectorAll("[data-preview-section]").forEach(cell => {
        cell.addEventListener("input", () => {
          const section = cell.dataset.previewSection;
          const row = Number(cell.dataset.row);
          const col = cell.dataset.col;
          if (state.sections[section]?.[row]) state.sections[section][row][col] = cell.textContent.trim();
        });
        cell.addEventListener("blur", () => {
          renderEditors();
          saveState();
        });
      });
      preview.querySelectorAll("[data-preview-add-row]").forEach(btn => btn.addEventListener("click", () => addRow(btn.dataset.previewAddRow)));
      preview.querySelectorAll("[data-preview-delete]").forEach(btn => btn.addEventListener("click", () => {
        state.sections[btn.dataset.previewDelete].splice(Number(btn.dataset.row), 1);
        renderEditors();
        saveState();
      }));
    }
    function buildMarkdown() {
      syncFormToState();
      const lines = [
        `# ${state.projectName} PRD`, "",
        "## 0. 文档说明", "",
        "| 项目 | 内容 |", "| --- | --- |",
        `| 文档版本 | v0.1 |`, `| 创建日期 | ${today} |`, `| 当前状态 | ${state.status} |`, "",
        "## 1. 背景与目标", "",
        "### 1.1 一句话产品定义", state.oneLine || "待确认", "",
        "### 1.2 目标用户", state.targetUsers || "待确认", "",
        "### 1.3 核心问题", state.problems || "待确认", "",
        "### 1.4 成功标志", state.successMetrics || "待确认", "",
        "## 2. 范围定义", "", "### 2.1 MVP 范围", markdownTable(baseSections.find(x => x.id === "scope").columns, state.sections.scope), "",
        "### 2.2 本版不做", state.outOfScope || "待确认", "",
        "## 3. 需求列表", markdownTable(baseSections.find(x => x.id === "requirements").columns, state.sections.requirements), "",
        "## 4. 字段与数据", markdownTable(baseSections.find(x => x.id === "fields").columns, state.sections.fields), "",
        "## 5. 验收标准", markdownTable(baseSections.find(x => x.id === "acceptance").columns, state.sections.acceptance), "",
        "## 6. 项目计划", markdownTable(baseSections.find(x => x.id === "plan").columns, state.sections.plan), "",
        "## 7. 工作流设计", state.aiWorkflow || "待确认", "",
        "## 8. 风险与待确认", state.risks || "待确认", "",
        "## 9. 对话记录摘要", state.notes || "待补充", ""
      ];
      return lines.join("\n");
    }
    function markdownTable(columns, rows) {
      const clean = value => String(value || "").replace(/\|/g, "\\|").replace(/\n/g, "<br>");
      return ["| " + columns.join(" | ") + " |", "| " + columns.map(() => "---").join(" | ") + " |"]
        .concat((rows || []).map(row => "| " + columns.map(col => clean(row[col])).join(" | ") + " |")).join("\n");
    }
    function exportHtml() {
      saveState();
      const wasEditing = previewEditing;
      previewEditing = false;
      const cleanPrd = buildPrdHtml();
      previewEditing = wasEditing;
      const doc = `<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>${escapeHtml(state.projectName)} PRD</title><style>${document.querySelector("style").textContent}</style></head><body><div class="shell"><section class="panel"><article class="doc-preview">${cleanPrd}</article></section></div></body></html>`;
      download(`${fileName(state.projectName)}_PRD.html`, doc, "text/html;charset=utf-8");
    }
    function exportMarkdown() { download(`${fileName(state.projectName)}_PRD.md`, buildMarkdown(), "text/markdown;charset=utf-8"); }
    function exportJson() { saveState(); download(`${fileName(state.projectName)}_PRD工作台.json`, JSON.stringify(state, null, 2), "application/json;charset=utf-8"); }
    function download(name, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
    function splitLines(value) { return String(value || "").split(/\n|；|;/).map(x => x.trim()).filter(Boolean); }
    function fileName(value) { return String(value || "PRD").replace(/[\\/:*?"<>|]+/g, "_").trim() || "PRD"; }
    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, "&#96;"); }
    function nl2br(value) { return escapeHtml(value).replace(/\n/g, "<br>"); }
    function init() {
      ["projectName","status","projectType","platform","oneLine","targetUsers","problems","mvp","priorityMode","aiWorkflow","outOfScope","successMetrics","risks"].forEach(bindField);
      renderChat();
      renderQuestions();
      renderEditors();
      renderPreview();
      document.getElementById("sendBtn").addEventListener("click", addChat);
      document.getElementById("chatInput").addEventListener("keydown", event => {
        if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) addChat();
      });
      document.getElementById("askNextBtn").addEventListener("click", askNext);
      document.getElementById("cancelChatEditBtn").addEventListener("click", clearChatEdit);
      document.getElementById("previewEditBtn").addEventListener("click", () => {
        previewEditing = !previewEditing;
        renderPreview();
      });
      document.getElementById("saveBtn").addEventListener("click", saveState);
      document.getElementById("generateBtn").addEventListener("click", generateFromForm);
      document.getElementById("fillSampleBtn").addEventListener("click", fillSample);
      document.getElementById("exportHtmlBtn").addEventListener("click", exportHtml);
      document.getElementById("exportMdBtn").addEventListener("click", exportMarkdown);
      document.getElementById("exportJsonBtn").addEventListener("click", exportJson);
    }
    init();
  </script>
</body>
</html>
