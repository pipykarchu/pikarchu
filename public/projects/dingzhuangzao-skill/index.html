<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>定妆造 Skill · 网页演示</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101113;
      --panel: #17191d;
      --panel-2: #20232a;
      --text: #f4f1ec;
      --muted: #a9a39a;
      --line: rgba(255,255,255,.1);
      --accent: #c6a16b;
      --green: #70c197;
      --pink: #e78aa7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(16,17,19,.94);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 { margin: 0; font-size: 20px; letter-spacing: 0; }
    .sub { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .status {
      display: flex;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 18px rgba(112,193,151,.8);
    }
    main {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 320px;
      min-height: calc(100vh - 78px);
    }
    aside, section { min-width: 0; }
    .left, .right {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
    }
    .right {
      border-right: 0;
      border-left: 1px solid var(--line);
    }
    .module-title {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }
    .role {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
      background: var(--panel-2);
    }
    .role button, .state {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font: inherit;
    }
    .role button { padding: 12px; font-weight: 700; }
    .state {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px 10px 24px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    .state.active { color: var(--text); background: rgba(198,161,107,.12); }
    .check { color: var(--green); font-weight: 800; }
    .center { padding: 20px; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 16px;
      align-items: stretch;
      margin-bottom: 18px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
    }
    h2 { margin: 0 0 8px; font-size: 24px; letter-spacing: 0; }
    h3 { margin: 0 0 12px; font-size: 15px; }
    .tone { color: var(--muted); font-size: 13px; line-height: 1.7; }
    .row-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 10px;
    }
    .engine {
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(198,161,107,.14);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .candidate {
      position: relative;
      min-height: 220px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(198,161,107,.22), transparent 48%),
        linear-gradient(315deg, rgba(231,138,167,.18), transparent 50%),
        var(--panel-2);
      cursor: pointer;
    }
    .portrait {
      height: 160px;
      display: grid;
      place-items: center;
      color: rgba(244,241,236,.86);
      font-weight: 800;
      font-size: 30px;
    }
    .candidate p {
      margin: 0;
      padding: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .heart {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(0,0,0,.36);
      color: var(--text);
    }
    .candidate.liked { outline: 2px solid var(--pink); }
    .candidate.liked .heart { background: var(--pink); }
    .form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }
    label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 13px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      background: var(--panel-2);
      cursor: pointer;
      font-weight: 700;
    }
    .btn.primary { background: var(--accent); color: #17130e; border-color: var(--accent); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .right dl { margin: 0; display: grid; gap: 12px; }
    .right dt { color: var(--accent); font-size: 12px; font-weight: 800; }
    .right dd { margin: 4px 0 0; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 1100px) {
      main { grid-template-columns: 240px minmax(0, 1fr); }
      .right { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line); }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      main { display: block; }
      .left, .right { border: 0; border-bottom: 1px solid var(--line); }
      .hero, .form { grid-template-columns: 1fr; }
      .candidate { min-height: 190px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>定妆造 Skill · 角色选角评审台</h1>
      <p class="sub">四张正面候选先选脸，再确认时期造型，最后进入三视图生产。</p>
    </div>
    <div class="status"><span class="dot"></span><span id="progress">已确认 0 / 3 个时期</span></div>
  </header>

  <main>
    <aside class="left">
      <p class="module-title">主线角色</p>
      <div id="nav"></div>
    </aside>

    <section class="center">
      <div class="hero">
        <div class="card">
          <h2 id="title"></h2>
          <p class="tone" id="summary"></p>
        </div>
        <div class="card">
          <h3>整体基调风格</h3>
          <p class="tone" id="tone"></p>
        </div>
      </div>

      <div class="row-head"><h3>Image2 候选</h3><span class="engine">Image2</span></div>
      <div class="grid" id="image2"></div>

      <div class="row-head"><h3>MJ 候选</h3><span class="engine">MJ</span></div>
      <div class="grid" id="mj"></div>

      <div class="form">
        <div>
          <label for="notes">心仪的点</label>
          <textarea id="notes" placeholder="例如：脸型可信、年代感自然、服装磨损刚好"></textarea>
        </div>
        <div>
          <label for="prompt">调整提示词</label>
          <textarea id="prompt" placeholder="例如：保留清冷气质，降低妆感，衣服更旧一点"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="next">进入下一版</button>
        <button class="btn primary" id="confirm">确认此时期造型</button>
        <button class="btn" id="save">保存选择</button>
        <button class="btn" id="overview" disabled>生成总览图</button>
      </div>
    </section>

    <aside class="right">
      <h3>世界观 / 场景约束</h3>
      <dl id="worldview"></dl>
    </aside>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const data = [
      {
        role: "林栀",
        age: "26 岁",
        states: [
          {
            name: "回乡调查期",
            summary: "年轻修复师回到水湾镇，外表克制，带一点城市职业感，但已经被乡土湿冷环境包住。",
            tone: "真人短剧质感，低饱和，湿冷南方小镇，布料有旧感，不做偶像剧精修。",
            worldview: {
              era: "当代乡镇，雨季，老街与祠堂之间",
              scene: "白天外景或老屋室内，角色刚进入事件核心",
              costume: "深色针织衫、旧外套、帆布包，鞋底沾湿泥",
              light: "阴天自然光，室内有冷色反光",
              forbid: "明星脸、精致影楼妆、现代潮流大片感",
              keywords: "修复师、克制、敏感、现实层主角"
            },
            candidates: ["冷静侧脸感", "疲惫但坚定", "书卷气更强", "乡土适应感"]
          }
        ]
      },
      {
        role: "娃娃仙姐姐",
        age: "外形十五六岁",
        states: [
          {
            name: "显灵救人期",
            summary: "不是恐怖鬼童，而是被误解的守护灵体。脸要有古旧瓷娃娃感，但仍像真实短剧演员。",
            tone: "民俗悬疑、瓷白肤色、旧花袄、多股麻花辫，清冷但不邪恶。",
            worldview: {
              era: "1990 年前后记忆层与民俗传说层交叠",
              scene: "祠堂、河边、旧屋门口，带轻微超现实感",
              costume: "灰花袄、布鞋、旧红绳，衣料粗糙",
              light: "冷月光或祠堂暗光，脸部识别清楚",
              forbid: "二次元、Q版、血腥、夸张恐怖妆",
              keywords: "守护灵、瓷感、民俗、清冷、善意"
            },
            candidates: ["瓷感更强", "更像乡村少女", "灵体气质更明显", "温柔守护感"]
          }
        ]
      },
      {
        role: "林奶奶",
        age: "70 岁左右",
        states: [
          {
            name: "临终托付期",
            summary: "老人不是神秘工具人，要能看出长期守秘、疼爱孙女、身体衰弱和乡村生活痕迹。",
            tone: "真实老人面孔，皱纹自然，衣服朴素，光线安静，情绪压住。",
            worldview: {
              era: "当代乡镇老屋室内",
              scene: "病榻、木柜、旧瓷娃娃、雨声背景",
              costume: "深色棉衣、旧围巾、无精致首饰",
              light: "昏黄台灯和阴天窗口光混合",
              forbid: "过度恐怖化、豪门老太太造型、磨皮美颜",
              keywords: "守秘者、祖母、托付、虚弱、温情"
            },
            candidates: ["慈爱更强", "守秘压迫感", "病弱状态", "乡土生活感"]
          }
        ]
      }
    ];

    const state = {
      currentRole: 0,
      currentState: 0,
      liked: new Set(),
      confirmed: new Set()
    };

    const nav = document.getElementById("nav");
    const title = document.getElementById("title");
    const summary = document.getElementById("summary");
    const tone = document.getElementById("tone");
    const image2 = document.getElementById("image2");
    const mj = document.getElementById("mj");
    const worldview = document.getElementById("worldview");
    const progress = document.getElementById("progress");
    const notes = document.getElementById("notes");
    const prompt = document.getElementById("prompt");
    const toast = document.getElementById("toast");
    const overview = document.getElementById("overview");

    function key(roleIndex = state.currentRole, stateIndex = state.currentState) {
      return `${roleIndex}-${stateIndex}`;
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function renderNav() {
      nav.innerHTML = data.map((role, roleIndex) => {
        const hasConfirmed = role.states.some((_, stateIndex) => state.confirmed.has(key(roleIndex, stateIndex)));
        const states = role.states.map((item, stateIndex) => {
          const active = roleIndex === state.currentRole && stateIndex === state.currentState;
          const done = state.confirmed.has(key(roleIndex, stateIndex));
          return `<button class="state ${active ? "active" : ""}" data-role="${roleIndex}" data-state="${stateIndex}">
            <span>${item.name}</span><span class="check">${done ? "✓" : ""}</span>
          </button>`;
        }).join("");
        return `<div class="role">
          <button data-role="${roleIndex}" data-state="0">${hasConfirmed ? "● " : ""}${role.role} · ${role.age}</button>
          ${states}
        </div>`;
      }).join("");
    }

    function renderCandidates(target, engine, items) {
      target.innerHTML = items.map((item, index) => {
        const id = `${key()}-${engine}-${index}`;
        const liked = state.liked.has(id);
        return `<article class="candidate ${liked ? "liked" : ""}" data-id="${id}">
          <span class="heart">♥</span>
          <div class="portrait">${index + 1}</div>
          <p>${engine} · ${item}</p>
        </article>`;
      }).join("");
    }

    function render() {
      const role = data[state.currentRole];
      const item = role.states[state.currentState];
      title.textContent = `${role.role} · ${item.name}`;
      summary.textContent = item.summary;
      tone.textContent = item.tone;
      renderCandidates(image2, "Image2", item.candidates);
      renderCandidates(mj, "MJ", item.candidates);
      worldview.innerHTML = Object.entries(item.worldview).map(([k, v]) => `<div><dt>${k}</dt><dd>${v}</dd></div>`).join("");
      const total = data.reduce((sum, roleItem) => sum + roleItem.states.length, 0);
      progress.textContent = `已确认 ${state.confirmed.size} / ${total} 个时期`;
      overview.disabled = state.confirmed.size !== total;
      renderNav();
    }

    nav.addEventListener("click", (event) => {
      const btn = event.target.closest("[data-role]");
      if (!btn) return;
      state.currentRole = Number(btn.dataset.role);
      state.currentState = Number(btn.dataset.state);
      render();
    });

    document.body.addEventListener("click", (event) => {
      const card = event.target.closest(".candidate");
      if (!card) return;
      const id = card.dataset.id;
      state.liked.has(id) ? state.liked.delete(id) : state.liked.add(id);
      render();
    });

    document.getElementById("confirm").addEventListener("click", () => {
      const currentPrefix = `${key()}-`;
      const count = [...state.liked].filter(id => id.startsWith(currentPrefix)).length;
      if (!count) {
        showToast("请先点选至少一个心仪候选");
        return;
      }
      state.confirmed.add(key());
      showToast("已确认此时期造型");
      render();
    });

    document.getElementById("next").addEventListener("click", () => {
      showToast("已记录进入下一版的调整意图");
    });

    document.getElementById("save").addEventListener("click", () => {
      const payload = {
        liked: [...state.liked],
        confirmedLooks: [...state.confirmed],
        notes: notes.value,
        adjustmentPrompt: prompt.value,
        savedAt: new Date().toISOString()
      };
      localStorage.setItem("dingzhuangzao-demo-selection", JSON.stringify(payload, null, 2));
      showToast("已保存到本机浏览器");
    });

    overview.addEventListener("click", () => showToast("已记录生成总览图意图"));
    render();
  </script>
</body>
</html>
